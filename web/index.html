<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="devansh">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <meta name="theme-color" content="#0A1929">

  <title>devansh</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #0A1929;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A1929;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #app-loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo + rotating ring */
    .loader-mark {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    /* Soft amber glow behind everything */
    .loader-glow {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 171, 30, 0.28) 0%, rgba(245, 171, 30, 0) 70%);
      animation: glow-pulse 2.2s ease-in-out infinite;
    }

    /* Rotating conic ring, partially transparent so it reads as a sweeping arc */
    .loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        transparent 260deg,
        #F5AB1E 320deg,
        #F5AB1E 360deg
      );
      animation: spin 1.4s linear infinite;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
    }

    /* Static faint track ring underneath, so the sweep has something to travel around */
    .loader-track {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(245, 171, 30, 0.14);
    }

    .loader-logo {
      position: relative;
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 12px;
      animation: breathe 2.2s ease-in-out infinite;
    }

    .loader-brand {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #F5F5F5;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      animation: fade-in 0.6s ease 0.3s forwards;
    }

    .loader-brand span {
      color: #F5AB1E;
    }

    /* Slim indeterminate progress line under the brand text */
    .loader-bar {
      width: 140px;
      height: 3px;
      margin-top: 18px;
      border-radius: 2px;
      background: rgba(245, 171, 30, 0.15);
      overflow: hidden;
      opacity: 0;
      animation: fade-in 0.6s ease 0.45s forwards;
    }

    .loader-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: #F5AB1E;
      border-radius: 2px;
      animation: bar-sweep 1.3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    @keyframes bar-sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>

  <div id="app-loading">
    <div class="loader-mark">
      <div class="loader-glow"></div>
      <div class="loader-track"></div>
      <div class="loader-ring"></div>
      <img class="loader-logo" src="assets/assets/logo.png" alt="Devansh" />
    </div>
    <p class="loader-brand">Devansh <span>Hardware</span></p>
    <div class="loader-bar"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loading');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function () { loader.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
